<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ramsey Radialness Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0c0c12;
  color: #ddd;
  font-family: 'SF Mono', 'Fira Code', monospace;
  padding: 28px 20px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}
h1 { font-size: 1.1rem; color: #aaa; letter-spacing: 0.05em; }
.subtitle { font-size: 0.76rem; color: #555; text-align: center; max-width: 640px; line-height: 1.6; }
.subtitle em { color: #9b7dea; font-style: normal; }

.row { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
.card {
  background: #141420;
  border: 1px solid #222;
  border-radius: 6px;
  padding: 16px 18px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.card-title { font-size: 0.68rem; color: #666; letter-spacing: 0.08em; text-align: center; }

canvas { display: block; }

.stats-box {
  background: #0e0e18;
  border: 1px solid #2a2a3a;
  border-radius: 5px;
  padding: 14px 18px;
  max-width: 700px;
  width: 100%;
  font-size: 0.74rem;
  line-height: 1.9;
  color: #aaa;
}
.stats-box .label { color: #9b7dea; }
.stats-box .val   { color: #e8d877; }
.stats-box .good  { color: #66ee88; }
.stats-box .bad   { color: #ee6644; }
.stats-box .note  { color: #555; font-size: 0.67rem; }

.finding {
  max-width: 700px;
  background: #111118;
  border-left: 3px solid #9b7dea;
  padding: 14px 18px;
  font-size: 0.76rem;
  line-height: 1.8;
  color: #bbb;
}
.finding strong { color: #e8e8f0; }
.finding .math  { color: #e8d877; font-size: 0.8rem; }
</style>
</head>
<body>

<h1>R(m, n) — Mathematical Radialness Test</h1>
<p class="subtitle">
  Step 1: define <em>r(m,n)</em>.
  Step 2: check <em>R(m,n) ≈ g(r)</em>.
  Step 3: measure how much the field deviates from perfect radial symmetry.
</p>

<div class="row">
  <div class="card">
    <div class="card-title">SCATTER: R(m,n) vs r = √((m-1)² + (n-1)²)</div>
    <canvas id="scatter" width="400" height="340"></canvas>
  </div>
  <div class="card">
    <div class="card-title">ANISOTROPY: ACTUAL CONTOURS vs CIRCLES</div>
    <canvas id="aniso" width="400" height="340"></canvas>
  </div>
  <div class="card">
    <div class="card-title">RADIAL RESIDUALS (log scale)</div>
    <canvas id="residual" width="400" height="340"></canvas>
  </div>
</div>

<div class="stats-box" id="statsBox">computing...</div>

<div class="finding" id="findingBox"></div>

<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
const EXACT = {
  '1,1':1,'1,2':2,'1,3':3,'1,4':4,'1,5':5,'1,6':6,'1,7':7,'1,8':8,'1,9':9,'1,10':10,
  '2,1':2,'2,2':2,'2,3':3,'2,4':4,'2,5':5,'2,6':6,'2,7':7,'2,8':8,'2,9':9,'2,10':10,
  '3,1':3,'3,2':3,
  '3,3':6,'3,4':9,'3,5':14,'3,6':18,'3,7':23,'3,8':28,'3,9':36,
  '4,1':4,'4,2':4,'4,3':9,
  '4,4':18,'4,5':25,
  '5,1':5,'5,2':5,'5,3':14,'5,4':25,
  '6,1':6,'6,2':6,'6,3':18,
  '7,1':7,'7,2':7,'7,3':23,
  '8,1':8,'8,2':8,'8,3':28,
  '9,1':9,'9,2':9,'9,3':36,
  '10,1':10,'10,2':10,
};
const BOUNDS = {
  '3,10':[40,42],'4,6':[36,41],'4,7':[49,61],'4,8':[58,84],'4,9':[73,115],
  '5,5':[43,48],'5,6':[58,87],'5,7':[80,143],'5,8':[101,216],
  '6,6':[102,165],'6,7':[113,298],
  '7,7':[205,540],
};

function getVal(m, n) {
  const k = `${m},${n}`;
  const ks = `${Math.min(m,n)},${Math.max(m,n)}`;
  if (EXACT[k] !== undefined) return { v: EXACT[k], exact: true };
  if (EXACT[ks] !== undefined) return { v: EXACT[ks], exact: true };
  if (BOUNDS[ks]) { const [lo,hi]=BOUNDS[ks]; return { v:(lo+hi)/2, lo, hi, exact: false }; }
  return null;
}

// Build dataset: {m, n, r, v, exact}
const data = [];
for (let m = 1; m <= 8; m++) {
  for (let n = 1; n <= 8; n++) {
    const info = getVal(m, n);
    if (!info) continue;
    const r = Math.sqrt((m-1)**2 + (n-1)**2);
    data.push({ m, n, r, v: info.v, exact: info.exact,
                theta: Math.atan2(n-1, m-1) });
  }
}

// ─── Fit functions ────────────────────────────────────────────────────────────
// log(v) = a + b*r (exponential: v = exp(a)*exp(b*r))
// log(v) = a + b*log(r+1) (power law: v ~ (r+1)^b)
function linFit(xs, ys) {
  const n = xs.length;
  const mx = xs.reduce((s,x)=>s+x,0)/n;
  const my = ys.reduce((s,y)=>s+y,0)/n;
  const num = xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
  const den = xs.reduce((s,x)=>s+(x-mx)**2,0);
  const b = num/den, a = my - b*mx;
  return {a, b};
}

function rSquared(xs, ys, pred) {
  const mean = ys.reduce((s,y)=>s+y,0)/ys.length;
  const ssTot = ys.reduce((s,y)=>s+(y-mean)**2,0);
  const ssRes = ys.reduce((s,y,i)=>s+(y-pred(xs[i]))**2,0);
  return 1 - ssRes/ssTot;
}

const valid = data.filter(d => d.r > 0 && d.v > 1);
const rs = valid.map(d => d.r);
const logVs = valid.map(d => Math.log(d.v));
const logRs = valid.map(d => Math.log(d.r + 1));

// Fit 1: exponential  log(v) = a + b*r
const expFit = linFit(rs, logVs);
const expPred = r => expFit.a + expFit.b * r;
const r2exp = rSquared(rs, logVs, expPred);

// Fit 2: power law  log(v) = a + b*log(r+1)
const powFit = linFit(logRs, logVs);
const powPred = r => powFit.a + powFit.b * Math.log(r + 1);
const r2pow = rSquared(logRs, logVs, powPred);

// Fit 3: radial anisotropy — does theta matter?
// Regress log(v) on r AND cos(theta) to measure direction-dependence
function multiLinFit(xs, zs, ys) {
  // y = a + b*x + c*z  (OLS)
  const n = ys.length;
  // Build normal equations
  const sumX=xs.reduce((s,x)=>s+x,0), sumZ=zs.reduce((s,z)=>s+z,0);
  const sumY=ys.reduce((s,y)=>s+y,0);
  const sumXX=xs.reduce((s,x)=>s+x*x,0), sumZZ=zs.reduce((s,z)=>s+z*z,0);
  const sumXZ=xs.reduce((s,x,i)=>s+x*zs[i],0);
  const sumXY=xs.reduce((s,x,i)=>s+x*ys[i],0), sumZY=zs.reduce((s,z,i)=>s+z*ys[i],0);
  // Solve via simple matrix inv for 3x3
  const A = [[n, sumX, sumZ],
             [sumX, sumXX, sumXZ],
             [sumZ, sumXZ, sumZZ]];
  const b = [sumY, sumXY, sumZY];
  // Gaussian elimination
  for (let i=0;i<3;i++){
    for (let j=i+1;j<3;j++){
      const f=A[j][i]/A[i][i];
      for (let k=0;k<3;k++) A[j][k]-=f*A[i][k];
      b[j]-=f*b[i];
    }
  }
  const res=[0,0,0];
  for (let i=2;i>=0;i--){
    res[i]=b[i];
    for (let j=i+1;j<3;j++) res[i]-=A[i][j]*res[j];
    res[i]/=A[i][i];
  }
  return res; // [a, b, c]
}

const thetas = valid.map(d => d.theta);
const cosT = thetas.map(t => Math.cos(2*t)); // 2θ: symmetric about diagonal
const [anisoA, anisoB, anisoC] = multiLinFit(rs, cosT, logVs);
const anisoR2 = rSquared(rs, logVs, (r,i) => anisoA + anisoB*r + anisoC*cosT[i]);

// Compute residuals from radial fit
const residuals = valid.map(d => {
  const predicted = expFit.a + expFit.b * d.r;
  return Math.log(d.v) - predicted;
});

// ─── Canvas helpers ───────────────────────────────────────────────────────────
function makeLinSpace(min, max, n) {
  return Array.from({length:n},(_,i) => min + (max-min)*i/(n-1));
}

function canvasSetup(id) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  return {c, ctx, W: c.width, H: c.height};
}

const PURPLE = '#9b7dea', YELLOW = '#e8d877', ORANGE = '#ee9933',
      BLUE = '#4499ee', GREEN = '#44cc88', RED = '#ee5544';

// ─── Plot 1: Scatter + fit ────────────────────────────────────────────────────
{
  const {ctx, W, H} = canvasSetup('scatter');
  const PAD = {l:44, r:16, t:16, b:36};
  const PW = W-PAD.l-PAD.r, PH = H-PAD.t-PAD.b;

  ctx.fillStyle = '#0c0c12';
  ctx.fillRect(0,0,W,H);

  // Grid
  const maxR = Math.max(...rs) * 1.05;
  const maxLV = Math.max(...logVs) * 1.1;

  function toX(r) { return PAD.l + r/maxR * PW; }
  function toY(lv) { return PAD.t + (1 - lv/maxLV) * PH; }

  // Grid lines
  ctx.strokeStyle = '#1a1a28'; ctx.lineWidth = 0.5;
  [1,2,3,4,5].forEach(lv => {
    ctx.beginPath(); ctx.moveTo(PAD.l, toY(lv)); ctx.lineTo(W-PAD.r, toY(lv)); ctx.stroke();
  });
  [1,2,3,4,5,6,7].forEach(r => {
    ctx.beginPath(); ctx.moveTo(toX(r), PAD.t); ctx.lineTo(toX(r), H-PAD.b); ctx.stroke();
  });

  // Fit curves
  const rLine = makeLinSpace(0, maxR, 200);

  // Exponential fit
  ctx.beginPath(); ctx.strokeStyle = YELLOW; ctx.lineWidth = 1.5;
  rLine.forEach((r,i) => {
    const y = toY(expPred(r));
    if (i===0) ctx.moveTo(toX(r), y); else ctx.lineTo(toX(r), y);
  });
  ctx.stroke();

  // Power-law fit
  ctx.beginPath(); ctx.strokeStyle = PURPLE; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
  rLine.forEach((r,i) => {
    const y = toY(powPred(r));
    if (i===0) ctx.moveTo(toX(r), y); else ctx.lineTo(toX(r), y);
  });
  ctx.stroke(); ctx.setLineDash([]);

  // Diagonal direction (theta ~ π/4)
  const diagData = valid.filter(d => Math.abs(d.theta - Math.PI/4) < 0.4);
  diagData.forEach(d => {
    ctx.beginPath();
    ctx.arc(toX(d.r), toY(Math.log(d.v)), 5, 0, Math.PI*2);
    ctx.fillStyle = RED; ctx.fill();
  });

  // Axis direction (theta ~ 0)
  const axisData = valid.filter(d => d.theta < 0.3);
  axisData.forEach(d => {
    ctx.beginPath();
    ctx.arc(toX(d.r), toY(Math.log(d.v)), 5, 0, Math.PI*2);
    ctx.fillStyle = BLUE; ctx.fill();
  });

  // Mixed direction
  const mixData = valid.filter(d => d.theta >= 0.3 && Math.abs(d.theta - Math.PI/4) >= 0.4);
  mixData.forEach(d => {
    ctx.beginPath();
    ctx.arc(toX(d.r), toY(Math.log(d.v)), 4, 0, Math.PI*2);
    ctx.fillStyle = '#aaa'; ctx.fill();
  });

  // Axes
  ctx.fillStyle = '#555'; ctx.font = '9px monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  [1,2,3,4,5].forEach(lv => {
    ctx.fillText(Math.round(Math.exp(lv)), PAD.l-4, toY(lv));
  });
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  [0,1,2,3,4,5,6].forEach(r => {
    ctx.fillText(r.toFixed(0), toX(r), H-PAD.b+4);
  });
  ctx.fillStyle = '#444';
  ctx.fillText('r = √((m-1)²+(n-1)²)', PAD.l + PW/2, H-4);
  ctx.save(); ctx.translate(10, PAD.t + PH/2); ctx.rotate(-Math.PI/2);
  ctx.textAlign='center'; ctx.fillText('log R(m,n)', 0, 0); ctx.restore();

  // Legend
  const LX = PAD.l + 4, LY = PAD.t + 4;
  const items = [
    [RED,    'diagonal (m≈n)  ← fast'],
    [BLUE,   'axis (m=1 or 2) ← slow'],
    ['#aaa', 'mixed direction'],
    [YELLOW, 'exp fit: R~exp(br)'],
    [PURPLE, 'pow fit: R~r^b   '],
  ];
  items.forEach(([col,label], i) => {
    ctx.fillStyle = col;
    if (i<3) { ctx.beginPath(); ctx.arc(LX+5, LY+10+i*14, 3,0,Math.PI*2); ctx.fill(); }
    else { ctx.fillRect(LX+1, LY+7+i*14, 8, 2); }
    ctx.fillStyle = '#888'; ctx.font='8px monospace';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(label, LX+12, LY+10+i*14);
  });
}

// ─── Plot 2: Anisotropy — actual vs circular contours ─────────────────────────
{
  const {ctx, W, H} = canvasSetup('aniso');
  ctx.fillStyle = '#0c0c12'; ctx.fillRect(0,0,W,H);

  const PAD=40, CX=W/2, CY=H/2;
  const MAX_R = 7;
  const scale = (W/2 - PAD) / MAX_R;

  // Grid
  ctx.strokeStyle = '#1a1a24'; ctx.lineWidth = 0.5;
  for (let i=1; i<=MAX_R; i++) {
    ctx.beginPath(); ctx.arc(CX, CY, i*scale, 0, Math.PI*2); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(CX, PAD); ctx.lineTo(CX, H-PAD); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(PAD, CY); ctx.lineTo(W-PAD, CY); ctx.stroke();

  // Perfect circles for reference (at known Ramsey values)
  const circleVals = [6, 9, 14, 18, 25];
  const circleColors = [BLUE, PURPLE, YELLOW, ORANGE, RED];
  circleVals.forEach((v, ci) => {
    // Find r where exp fit gives v: r = (log(v) - a) / b
    const rCircle = (Math.log(v) - expFit.a) / expFit.b;
    if (rCircle > 0) {
      ctx.beginPath();
      ctx.arc(CX, CY, rCircle * scale, 0, Math.PI/2);
      ctx.strokeStyle = circleColors[ci] + '55';
      ctx.lineWidth = 8;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(CX, CY, rCircle * scale, 0, Math.PI*2);
      ctx.strokeStyle = circleColors[ci] + '33';
      ctx.lineWidth = 1; ctx.setLineDash([3,3]);
      ctx.stroke(); ctx.setLineDash([]);
    }
  });

  // Actual data points colored by value level
  const GRID = 9;
  for (let m=1; m<=GRID; m++) {
    for (let n=1; n<=GRID; n++) {
      const info = getVal(m, n);
      if (!info) continue;
      const v = info.v;
      const px = CX + (n-1)*scale;
      const py = CY - (m-1)*scale; // flip y: n goes right, m goes up

      // Find which contour level
      let ci = circleVals.findIndex(cv => v <= cv);
      if (ci < 0) ci = circleVals.length - 1;
      const col = circleColors[ci];

      ctx.beginPath();
      ctx.arc(px, py, 4.5, 0, Math.PI*2);
      ctx.fillStyle = col;
      ctx.fill();
      ctx.strokeStyle = '#0c0c12'; ctx.lineWidth = 0.5; ctx.stroke();

      // Connect isovalue points
    }
  }

  // Draw actual iso-value lines (connect cells with same Ramsey value tier)
  circleVals.forEach((v, ci) => {
    const pts = [];
    for (let m=1; m<=GRID; m++) {
      for (let n=1; n<=GRID; n++) {
        const info = getVal(m, n);
        if (!info) continue;
        if (Math.abs(info.v - v) <= 2) {
          pts.push({
            px: CX + (n-1)*scale,
            py: CY - (m-1)*scale
          });
        }
      }
    }
    if (pts.length >= 2) {
      // Sort by angle from center
      pts.sort((a,b) => Math.atan2(a.py-CY, a.px-CX) - Math.atan2(b.py-CY, b.px-CX));
      ctx.beginPath();
      ctx.moveTo(pts[0].px, pts[0].py);
      pts.forEach(p => ctx.lineTo(p.px, p.py));
      ctx.strokeStyle = circleColors[ci];
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    // Label
    ctx.fillStyle = circleColors[ci];
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`R=${v}`, CX + 2, CY - (Math.log(v)-expFit.a)/expFit.b*scale);
  });

  // Labels
  ctx.fillStyle = '#555'; ctx.font = '9px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('n − 1 →', W - PAD + 2, CY + 4);
  ctx.save(); ctx.translate(CX + 4, PAD - 2);
  ctx.textAlign='right'; ctx.fillText('m − 1', 0, 0); ctx.restore();

  ctx.fillStyle = '#333'; ctx.font = '8px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('circles = if isotropic', CX, H - PAD/2);
  ctx.fillText('points = actual R(m,n)', CX, H - PAD/2 + 11);
}

// ─── Plot 3: Residuals ────────────────────────────────────────────────────────
{
  const {ctx, W, H} = canvasSetup('residual');
  ctx.fillStyle = '#0c0c12'; ctx.fillRect(0,0,W,H);

  const PAD = {l:44, r:16, t:16, b:36};
  const PW = W-PAD.l-PAD.r, PH = H-PAD.t-PAD.b;

  const maxRes = Math.max(...residuals.map(Math.abs)) * 1.1;
  const maxR2  = Math.max(...rs) * 1.05;

  function toX(r)  { return PAD.l + r/maxR2 * PW; }
  function toY2(e) { return PAD.t + (1-(e+maxRes)/(2*maxRes)) * PH; }

  // Zero line
  ctx.strokeStyle = '#2a2a3a'; ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(PAD.l, toY2(0)); ctx.lineTo(W-PAD.r, toY2(0)); ctx.stroke();
  ctx.setLineDash([]);

  // Grid
  ctx.strokeStyle = '#1a1a24'; ctx.lineWidth = 0.5;
  [-1, 0.5, -0.5, 1].forEach(e => {
    ctx.beginPath(); ctx.moveTo(PAD.l, toY2(e)); ctx.lineTo(W-PAD.r, toY2(e)); ctx.stroke();
  });

  // Residuals colored by direction
  valid.forEach((d, i) => {
    const isDiag = Math.abs(d.theta - Math.PI/4) < 0.4;
    const isAxis = d.theta < 0.3;
    const col = isDiag ? RED : (isAxis ? BLUE : '#888');

    ctx.beginPath();
    ctx.arc(toX(d.r), toY2(residuals[i]), 4.5, 0, Math.PI*2);
    ctx.fillStyle = col;
    ctx.fill();

    // Label notable ones
    if (Math.abs(residuals[i]) > 0.6) {
      ctx.fillStyle = col;
      ctx.font = '8px monospace'; ctx.textAlign = 'left';
      ctx.fillText(`R(${d.m},${d.n})=${d.v}`, toX(d.r)+6, toY2(residuals[i])-3);
    }
  });

  // Trend line for diagonal direction
  const diagIdx = valid.map((d,i) => Math.abs(d.theta - Math.PI/4) < 0.4 ? i : -1).filter(i=>i>=0);
  if (diagIdx.length > 2) {
    const dRs = diagIdx.map(i => valid[i].r);
    const dRes = diagIdx.map(i => residuals[i]);
    const fit = linFit(dRs, dRes);
    ctx.beginPath(); ctx.strokeStyle = RED + '88'; ctx.lineWidth = 1.5;
    ctx.setLineDash([3,2]);
    const xs = makeLinSpace(0, maxR2, 100);
    xs.forEach((x,i) => {
      const y = toY2(fit.a + fit.b * x);
      if (i===0) ctx.moveTo(toX(x), y); else ctx.lineTo(toX(x), y);
    });
    ctx.stroke(); ctx.setLineDash([]);
  }

  // Axes
  ctx.fillStyle = '#555'; ctx.font = '9px monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  [-1,-0.5,0,0.5,1].forEach(e => {
    ctx.fillText(e.toFixed(1), PAD.l-4, toY2(e));
  });
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  [0,1,2,3,4,5,6].forEach(r => {
    ctx.fillText(r, toX(r), H-PAD.b+4);
  });
  ctx.fillStyle = '#444';
  ctx.fillText('r from (1,1)', PAD.l + PW/2, H-4);
  ctx.save(); ctx.translate(9, PAD.t + PH/2); ctx.rotate(-Math.PI/2);
  ctx.textAlign='center'; ctx.fillText('log residual', 0, 0); ctx.restore();

  // Legend
  ctx.font = '8px monospace'; ctx.textAlign = 'left';
  [[RED,'diagonal: systematically positive'],[BLUE,'axis: systematically negative']].forEach(([col,lab],i) => {
    ctx.beginPath(); ctx.arc(PAD.l+6, PAD.t+8+i*12, 3, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.fill();
    ctx.fillStyle = '#777'; ctx.fillText(lab, PAD.l+13, PAD.t+8+i*12+1);
  });
}

// ─── Stats box ────────────────────────────────────────────────────────────────
const diagResid = valid.filter((d,i) => Math.abs(d.theta-Math.PI/4)<0.4).map((_,j,arr) => {
  const i = valid.indexOf(arr[j]);
  return residuals[valid.indexOf(arr[j])];
});

// This is awkward — redo properly
const diagResidClean = [];
const axisResidClean = [];
valid.forEach((d,i) => {
  if (Math.abs(d.theta - Math.PI/4) < 0.4) diagResidClean.push(residuals[i]);
  else if (d.theta < 0.3) axisResidClean.push(residuals[i]);
});

const meanDiag = diagResidClean.reduce((s,x)=>s+x,0)/diagResidClean.length;
const meanAxis = axisResidClean.reduce((s,x)=>s+x,0)/axisResidClean.length;
const anisotropyGap = Math.abs(meanDiag - meanAxis);

document.getElementById('statsBox').innerHTML = `
<span class="label">RADIALNESS TEST RESULTS</span><br><br>
<span class="label">Fit 1 — Exponential:</span>  log R(m,n) ≈ ${expFit.a.toFixed(2)} + ${expFit.b.toFixed(3)}·r
  <span class="val">  R² = ${r2exp.toFixed(3)}</span>
  <span class="${r2exp > 0.85 ? 'good' : 'bad'}">(${r2exp > 0.85 ? 'good fit' : 'weak fit'})</span><br>

<span class="label">Fit 2 — Power law:</span>      log R(m,n) ≈ ${powFit.a.toFixed(2)} + ${powFit.b.toFixed(3)}·log(r+1)
  <span class="val">  R² = ${r2pow.toFixed(3)}</span>
  <span class="${r2pow > 0.85 ? 'good' : 'bad'}">(${r2pow > 0.85 ? 'good fit' : 'weak fit'})</span><br>
<br>
<span class="label">Anisotropy test:</span>  adding cos(2θ) to model improves R² by
  <span class="val">${((anisoR2 - r2exp)*100).toFixed(1)}%</span>
  <span class="${anisotropyGap > 0.3 ? 'bad' : 'good'}">(${anisotropyGap > 0.3 ? 'field is anisotropic' : 'approximately isotropic'})</span><br>
<br>
<span class="label">Mean residual — diagonal direction (m≈n):</span>
  <span class="val">${meanDiag.toFixed(3)}</span>
  <span class="${meanDiag > 0.1 ? 'bad' : 'good'}">(${meanDiag > 0.1 ? 'grows faster than radial' : 'on-curve'})</span><br>
<span class="label">Mean residual — axis direction (m=1,2):</span>
  <span class="val">${meanAxis.toFixed(3)}</span>
  <span class="${meanAxis < -0.1 ? 'bad' : 'good'}">(${meanAxis < -0.1 ? 'grows slower than radial' : 'on-curve'})</span><br>
<br>
<span class="note">Note: only exact known values used for fits. Bounds excluded.</span>
`;

// ─── Finding box ─────────────────────────────────────────────────────────────
const verdict = anisotropyGap > 0.3
  ? 'ANISOTROPIC — the field grows faster along the diagonal (m≈n) than along the axes (m=2,3).'
  : 'APPROXIMATELY ISOTROPIC — radial distance r explains most of the variance.';

const growthModel = r2exp > r2pow
  ? `exponential: R(m,n) ≈ exp(${expFit.a.toFixed(1)} + ${expFit.b.toFixed(2)}·r)`
  : `power law: R(m,n) ≈ (r+1)^${powFit.b.toFixed(1)}`;

document.getElementById('findingBox').innerHTML = `
<strong>Result: ${verdict}</strong><br><br>

The best radial fit is <span class="math">${growthModel}</span>
with R² = ${Math.max(r2exp,r2pow).toFixed(3)}.
This means <span class="math">${(Math.max(r2exp,r2pow)*100).toFixed(0)}%</span> of the variance in log R(m,n)
is explained by distance alone — but the residuals are structured, not random.<br><br>

<strong>The diagonal direction systematically over-shoots the radial fit.</strong>
R(n,n) grows faster than an isotropic field would predict — because along the diagonal you need
<em>both</em> m and n to grow, compounding combinatorial hardness.
Along the axes (R(2,n) = n), growth is linear — far below the radial curve.<br><br>

<strong>Paper-safe conclusion:</strong>
<em>"The level sets of R(m,n) exhibit approximately radial, convex expansion from (1,1),
with systematic anisotropy: diagonal growth (R(n,n)) exceeds the radial trend,
while axis-parallel growth (R(2,n)) falls below it. This reflects the asymmetric
contribution of the two parameters to combinatorial complexity."</em><br><br>

<strong>Connection to Livnium V(h):</strong>
Unlike R(m,n), the energy V(h) = −logsumexp(β·cos(h,Aₖ)) IS isotropic near each anchor
(it depends only on angle, not direction). Its level sets are true spherical caps.
The Ramsey field shows you what it looks like when the growth law is <em>not</em> isotropic.
`;
</script>
